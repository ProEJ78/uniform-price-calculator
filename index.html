<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USAR Quartermaster Corps Price Calculator</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 40px;
      background: #0f172a;
      color: #f8fafc;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

   .container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;

  align-items: start;
}

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
      border: 1px solid #1f2937;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .price {
      font-size: 42px;
      font-weight: bold;
      color: #60a5fa;
      text-align: center;
      margin-top: 20px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      font-size: 16px;
      background: #1f2937;
      color: white;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 220px;
      resize: none;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #374151;
      font-size: 14px;
      margin-bottom: 12px;
      background: #1f2937;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3b82f6;
      transform: translateY(-1px);
    }

    .hidden {
      display: none;
    }

    .price-note {
      font-size: 14px;
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>USAR Quartermaster Corps Price Calculator</h1>

  <div class="container">

    <!-- FINAL PRICE -->
    <div class="card">
      <h2>Final Price</h2>

      <div class="price" id="finalPrice">R$0</div>

      <div class="price-note">
        Every selected asset costs R$3.
      </div>
    </div>

    <!-- UNIFORM TYPE -->
    <div class="card">
      <h2>Uniform Type</h2>

      <select id="uniformSelect">
        <option value="">Select Uniform</option>
      </select>
    </div>

    <!-- RIBBONS -->
    <div class="card hidden" id="ribbonsCard">
      <h2>Ribbons</h2>

      <div class="checkbox-group" id="ribbonsContainer"></div>
    </div>

    <!-- BADGES -->
    <div class="card hidden" id="badgesCard">
      <h2>Badges</h2>

      <div class="checkbox-group" id="badgesContainer"></div>
    </div>

    <!-- FOREIGN DEVICES -->
    <div class="card hidden" id="foreignCard">
      <h2>Foreign Devices</h2>

      <div class="checkbox-group" id="foreignContainer"></div>
    </div>

    <!-- ACCESSORIES -->
    <div class="card hidden" id="accessoriesCard">
      <h2>Accessories</h2>

      <div class="checkbox-group" id="accessoriesContainer"></div>
    </div>

    <!-- ORDER TEMPLATE -->
    <div class="card">
      <h2>Ordering Template</h2>

      <textarea id="templateOutput" readonly></textarea>

      <button id="copyButton">
        Copy Template
      </button>
    </div>

  </div>

  <script>

    /*
    =====================================================
    EASY CUSTOMIZATION SECTION
    =====================================================

    HOW THIS WORKS:

    - Each uniform can have different categories.
    - If a category is empty, it stays hidden.
    - Every checkbox costs 3.

    TO ADD MORE ITEMS:

    Just add more text inside the arrays.

    Example:

    ribbons: [
      "Air Assault",
      "Combat Action",
      "New Ribbon"
    ]

    =====================================================
    */

    const DEFAULT_PRICE = 3;

    const uniformData = {

      "AGSU": {
        basePrice: 40,
        
        ribbons: [
          { name: "Army Distinguished Service Cross", price: 3 },
          { name: "Defense Distinguished Service", price: 3 },
          { name: "Army Distinguished Service", price: 3 },
          { name: "Silver Star", price: 3 },
          { name: "Defense Superior Service", price: 3 },
          { name: "Legion of Merit", price: 3 },
          { name: "Distinguished Flying Cross", price: 3 },
          { name: "Soldiers Medal", price: 3 },
          { name: "Bronze Star", price: 3 },
          { name: "Defense Meritorious Service", price: 3 },
          { name: "Meritorious Service", price: 3 },
          { name: "Air Medal", price: 3 },
          { name: "Joint Service Commendation", price: 3 },
          { name: "Army Commendation", price: 3 },
          { name: "Joint Service Achievement", price: 3 },
          { name: "Army Achievement", price: 3 },
          { name: "Public Service Commendation Medal", price: 3 },
          { name: "Wargames Medal", price: 3 },
          { name: "Army Good Conduct", price: 3 },
          { name: "Army of Occupation Medal", price: 3 },
          { name: "Outstanding Volunteer", price: 3 },
          { name: "National Defense Service", price: 0 },
          { name: "Global War on Terrorism Service", price: 0 },
          { name: "NCO Professional Development", price: 3 },
          { name: "Army Service", price: 0 },
          { name: "Military Justice", price: 3 },
          { name: "Army Recruiting Ribbon", price: 3 },
          { name: "United Nations Medal", price: 3 },
          { name: "Antarctica Service", price: 3 },
          { name: "Armed Forces Expeditionary Medal", price: 3 },
          { name: "Southwest Asia Service", price: 3 },
          { name: "Kosovo Campaign", price: 3 },
          { name: "Kuwait Liberation Medal", price: 3 },
          { name: "Afghanistan Campaign", price: 3 },
          { name: "Iraq Campaign", price: 3 },
          { name: "Joint Special Operations Campaign", price: 3 },
          { name: "Global War on Terrorism Expeditionary", price: 3 },
          { name: "Armed Forces Service Medal", price: 3 },
          { name: "Army Sea Duty", price: 3 },
          { name: "Army Overseas Service", price: 3 },
          { name: "NATO Non-Article 5", price: 3 },
          { name: "NATO Article 5", price: 3 }
                ],

        badges: [
  { name: "Combat Infantryman Badge", price: 3 },
  { name: "Combat Medical Badge", price: 3 },
  { name: "Combat Action Badge", price: 3 },
  { name: "Expert Infantryman Badge", price: 3 },
  { name: "Expert Field Medical Badge", price: 3 },
  { name: "Expert Soldier Badge", price: 3 },
  { name: "Aviator Badge", price: 3 },

  { name: "Space Operations Badge", price: 3 },
  { name: "Special Operations Diver Badge", price: 3 },
  { name: "Driver and Mechanic Badges", price: 3 },
  { name: "Marksmanship Badges", price: 3 },
  { name: "Drill Sergeant Identification Badge", price: 3 },
  { name: "Army Instructor Identification Badge", price: 3 },
  { name: "Master Gunner Identification Badge", price: 3 },
  { name: "Recruiter Badge", price: 3 },
  { name: "Combat Service Identification Badge", price: 3 },
  { name: "Presidents Hundred Tab", price: 3 },
  { name: "Special Forces Tab", price: 3 },
  { name: "Ranger Tab", price: 3 },
  { name: "Sapper Tab", price: 3 },
  { name: "Jungle Tab", price: 3 },
  { name: "Arctic Tab", price: 3 },
  { name: "Overseas Bar", price: 3 },
  { name: "Service Stripe", price: 3 }
          
        ],

        foreignDevices: [
{ name: "Queens Dedication Medal", price: 3 },
{ name: "Combat Readiness Medal", price: 3 },
{ name: "Turkish Marksmanship Medal", price: 3 },
{ name: "Chiefs Fifty Marksmanship Badge", price: 3 },
{ name: "Marine Special Operations Badge", price: 3 },
{ name: "Marine Corps Combat Aircrew Badge", price: 3 },
{ name: "Republic of Korea Jump Wings", price: 3 },
{ name: "Royal Air Force Parachute Wings", price: 3 },
{ name: "Royal Air Force Aviator Wings", price: 3 },
{ name: "Armed Forces of the Philippines Airborne Badge", price: 3 }
        ],

        accessories: [
          { name: "Ribbon Offset", price: 3 },
          { name: "Badge Offset", price: 3 }
        ],
      },

      "OCP": {
        basePrice: 40,
        
        ribbons: [],

        badges: [
  { name: "Combat Infantryman Badge", price: 3 },
  { name: "Combat Medical Badge", price: 3 },
  { name: "Combat Action Badge", price: 3 },
  { name: "Expert Infantryman Badge", price: 3 },
  { name: "Expert Field Medical Badge", price: 3 },
  { name: "Expert Soldier Badge", price: 3 },
  { name: "Aviator Badge", price: 3 },
  { name: "Flight Surgeon Badge", price: 3 },
  { name: "Aviation Badge", price: 3 },
  { name: "Army Astronaut Device", price: 3 },
  { name: "Explosive Ordnance Disposal Badge", price: 3 },
  { name: "Army Parachutist Badge", price: 3 },
  { name: "Army Pathfinder Badge", price: 3 },
  { name: "Army Air Assault Badge", price: 3 },
  { name: "Military Freefall Badge", price: 3 },
  { name: "Mountaineering Badge", price: 3 },
  { name: "Space Operations Badge", price: 3 },
  { name: "Special Operations Diver Badge", price: 3 },
  { name: "Drill Sergeant Identification Badge", price: 3 },
  { name: "Army Instructor Identification Badge", price: 3 },
  { name: "Master Gunner Identification Badge", price: 3 },
  { name: "Recruiter Badge", price: 3 },
  { name: "Combat Service Identification Badge", price: 3 },
  { name: "Presidents Hundred Tab", price: 3 },
  { name: "Special Forces Tab", price: 3 },
  { name: "Ranger Tab", price: 3 },
  { name: "Sapper Tab", price: 3 },
  { name: "Jungle Tab", price: 3 },
  { name: "Arctic Tab", price: 3 }
        ],

        foreignDevices: [
{ name: "Marine Special Operations Badge", price: 3 },
{ name: "Marine Corps Combat Aircrew Badge", price: 3 },
{ name: "Republic of Korea Jump Wings", price: 3 },
{ name: "Royal Air Force Parachute Wings", price: 3 },
{ name: "Royal Air Force Aviator Wings", price: 3 },
{ name: "Armed Forces of the Philippines Airborne Badge", price: 3 }
        ],

        accessories: [
        { name: "Watch", price: 3 },
        { name: "1 Tattoo", price: 5 },
        { name: "2 Tattoos", price: 10 }
        ]
      },

      "Class C": {
        ribbons: [
          "Service Ribbon"
        ],

        badges: [],

        foreignDevices: [],

        accessories: []
      },

      "Class B": {
        ribbons: [],
        badges: [],
        foreignDevices: [],
        accessories: []
      }

    };

    const uniformSelect = document.getElementById("uniformSelect");
    const finalPrice = document.getElementById("finalPrice");
    const templateOutput = document.getElementById("templateOutput");
    const copyButton = document.getElementById("copyButton");

    const ribbonsCard = document.getElementById("ribbonsCard");
    const badgesCard = document.getElementById("badgesCard");
    const foreignCard = document.getElementById("foreignCard");
    const accessoriesCard = document.getElementById("accessoriesCard");

    const ribbonsContainer = document.getElementById("ribbonsContainer");
    const badgesContainer = document.getElementById("badgesContainer");
    const foreignContainer = document.getElementById("foreignContainer");
    const accessoriesContainer = document.getElementById("accessoriesContainer");


    // Populate uniform dropdown
    Object.keys(uniformData).forEach(uniform => {
      const option = document.createElement("option");
      option.value = uniform;
      option.textContent = uniform;
      uniformSelect.appendChild(option);
    });


    // Create checkbox list
    function createCheckboxes(container, items, type) {

  container.innerHTML = "";

  items.forEach(item => {

    // Supports BOTH strings and custom price objects
    const itemName = typeof item === "string"
      ? item
      : item.name;

    const itemPrice = typeof item === "string"
      ? DEFAULT_PRICE
      : item.price;

    const label = document.createElement("label");

    const checkbox = document.createElement("input");

    checkbox.type = "checkbox";
    checkbox.value = itemName;
    checkbox.dataset.type = type;
    checkbox.dataset.price = itemPrice;

    checkbox.addEventListener("change", updateCalculator);

    label.appendChild(checkbox);

    label.appendChild(
      document.createTextNode(`${itemName} ($${itemPrice})`)
    );

    container.appendChild(label);

  });

}


    // Show/hide categories based on selected uniform
    uniformSelect.addEventListener("change", () => {

      const selectedUniform = uniformData[uniformSelect.value];

      // Reset all cards
      ribbonsCard.classList.add("hidden");
      badgesCard.classList.add("hidden");
      foreignCard.classList.add("hidden");
      accessoriesCard.classList.add("hidden");

      ribbonsContainer.innerHTML = "";
      badgesContainer.innerHTML = "";
      foreignContainer.innerHTML = "";
      accessoriesContainer.innerHTML = "";

      if (!selectedUniform) {
        updateCalculator();
        return;
      }

      // Ribbons
      if (selectedUniform.ribbons.length > 0) {
        ribbonsCard.classList.remove("hidden");
        createCheckboxes(
          ribbonsContainer,
          selectedUniform.ribbons,
          "Ribbons"
        );
      }

      // Badges
      if (selectedUniform.badges.length > 0) {
        badgesCard.classList.remove("hidden");
        createCheckboxes(
          badgesContainer,
          selectedUniform.badges,
          "Badges"
        );
      }

      // Foreign Devices
      if (selectedUniform.foreignDevices.length > 0) {
        foreignCard.classList.remove("hidden");
        createCheckboxes(
          foreignContainer,
          selectedUniform.foreignDevices,
          "Foreign Devices"
        );
      }

      // Accessories
      if (selectedUniform.accessories.length > 0) {
        accessoriesCard.classList.remove("hidden");
        createCheckboxes(
          accessoriesContainer,
          selectedUniform.accessories,
          "Accessories"
        );
      }

      updateCalculator();
    });


    // Main calculator
    function updateCalculator() {

      const checked = document.querySelectorAll("input[type='checkbox']:checked");

      const selectedUniform = uniformData[uniformSelect.value];

      let total = selectedUniform?.basePrice || 0;

      const selected = {
        "Badges": [],
        "Ribbons": [],
        "Foreign Devices": [],
        "Accessories": []
      };

      checked.forEach(box => {
        total += Number(box.dataset.price);

        selected[box.dataset.type].push(box.value);
      });

      finalPrice.textContent = `R$${total}`;

      templateOutput.value =
`Uniform Type: ${uniformSelect.value || "None"}

Badges: ${selected["Badges"].length ? selected["Badges"].join(", ") : "None"}

Ribbons: ${selected["Ribbons"].length ? selected["Ribbons"].join(", ") : "None"}

Foreign Devices: ${selected["Foreign Devices"].length ? selected["Foreign Devices"].join(", ") : "None"}

Accessories: ${selected["Accessories"].length ? selected["Accessories"].join(", ") : "None"}`;
    }


    updateCalculator();


    // Copy ordering template
    copyButton.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(templateOutput.value);

        copyButton.textContent = "Copied!";

        setTimeout(() => {
          copyButton.textContent = "Copy Template";
        }, 1500);

      } catch (err) {
        alert("Failed to copy template.");
      }
    });

  </script>

</body>
</html>
